<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#1a3a7a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Subtle glow circle -->
  <circle cx="256" cy="220" r="160" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.2"/>
  <!-- FCE letters -->
  <text x="256" y="305"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, Arial Black, sans-serif"
    font-size="188"
    font-weight="900"
    letter-spacing="-8"
    fill="#ffffff">FCE</text>
  <!-- Blue accent bar -->
  <rect x="146" y="328" width="220" height="8" rx="4" fill="#3b82f6"/>
  <!-- Tiny tagline -->
  <text x="256" y="390"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
    font-size="38"
    font-weight="600"
    letter-spacing="6"
    fill="#60a5fa"
    opacity="0.85">FÚTBOL ELITE</text>
</svg>
