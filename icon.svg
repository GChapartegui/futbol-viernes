<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#080d1a"/>

  <!-- ── Flame trails (ball heading upper-left → flames trail lower-right) ── -->

  <!-- Flame 1: big upper sweep, curling outward -->
  <path d="M50 44 C56 36 66 26 76 16 C80 10 86 6 90 4
           C84 10 78 16 74 24 C80 16 86 10 86 4
           C78 12 70 22 66 32 C70 22 74 14 70 8
           C62 18 56 30 52 40 Z"
        fill="white" opacity="0.90"/>

  <!-- Flame 2: sweeping rightward -->
  <path d="M52 50 C62 48 74 44 86 40
           C88 38 93 34 95 30
           C88 36 80 40 76 42
           C84 38 91 33 89 27
           C80 36 68 42 56 48 Z"
        fill="white" opacity="0.72"/>

  <!-- Flame 3: lower drip -->
  <path d="M48 56 C54 64 60 76 62 88
           C60 80 56 70 52 62
           C56 72 58 83 54 90
           C50 80 50 68 48 58 Z"
        fill="white" opacity="0.52"/>

  <!-- Spark dots -->
  <circle cx="92" cy="38" r="2.2" fill="white" opacity="0.55"/>
  <circle cx="88" cy="52" r="1.6" fill="white" opacity="0.40"/>
  <circle cx="65" cy="90" r="1.4" fill="white" opacity="0.36"/>
  <circle cx="95" cy="28" r="1.2" fill="white" opacity="0.42"/>

  <!-- ── Football (sketch, upper-left, moving that direction) ── -->
  <!-- Ball center (31, 32), radius 23 -->

  <!-- Outer circle -->
  <circle cx="31" cy="32" r="23"   fill="#080d1a" stroke="white" stroke-width="2.4"/>
  <circle cx="31" cy="32" r="23.8" fill="none"    stroke="white" stroke-width="0.55"
          stroke-dasharray="1.8 6.5" stroke-dashoffset="2" opacity="0.22"/>

  <!-- Top pentagon (point-up, scaled) -->
  <!-- Vertices: (31,9)·(39,15)·(37,23)·(25,23)·(23,15) -->
  <path d="M31 9 L39 15 L37 23 L25 23 L23 15 Z"
        fill="none" stroke="white" stroke-width="2.0"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right hexagon -->
  <path d="M39 15 L47 12 L51 21 L47 30 L37 31 L37 23 Z"
        fill="none" stroke="white" stroke-width="1.7"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>

  <!-- Left hexagon -->
  <path d="M23 15 L15 12 L11 21 L15 30 L25 31 L25 23 Z"
        fill="none" stroke="white" stroke-width="1.7"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>

  <!-- Lower-right pentagon -->
  <path d="M47 30 L53 36 L50 45 L40 47 L37 38 L37 31 Z"
        fill="none" stroke="white" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>

  <!-- Lower-left pentagon -->
  <path d="M15 30 L9 36 L12 45 L22 47 L25 38 L25 31 Z"
        fill="none" stroke="white" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>

  <!-- Bottom hexagon -->
  <path d="M25 38 L22 47 L31 53 L40 47 L37 38 L31 40 Z"
        fill="none" stroke="white" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.62"/>

</svg>
