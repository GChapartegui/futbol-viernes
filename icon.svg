<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#080d1a"/>

  <!-- ── Shooting star ── -->
  <!-- Glow layers (wide → narrow) -->
  <line x1="92" y1="6" x2="63" y2="35" stroke="white" stroke-width="7"   stroke-linecap="round" opacity="0.05"/>
  <line x1="92" y1="6" x2="63" y2="35" stroke="white" stroke-width="4"   stroke-linecap="round" opacity="0.14"/>
  <line x1="92" y1="6" x2="63" y2="35" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.95"/>
  <!-- Trailing sparkle dots -->
  <circle cx="86" cy="12" r="1.3"  fill="white" opacity="0.75"/>
  <circle cx="80" cy="18" r="1.0"  fill="white" opacity="0.52"/>
  <circle cx="74" cy="24" r="0.75" fill="white" opacity="0.32"/>
  <circle cx="68" cy="30" r="0.55" fill="white" opacity="0.18"/>
  <!-- 4-pointed star at head -->
  <path d="M93 6 L94.4 2 L95.8 6 L100 7.4 L95.8 8.8 L94.4 13 L93 8.8 L88.8 7.4 Z" fill="white"/>
  <!-- Tiny cross sparkles near star -->
  <line x1="91" y1="3.5" x2="91" y2="8.5" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>
  <line x1="88.5" y1="6" x2="93.5" y2="6" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>

  <!-- ── Football — sketch / line-art ── -->
  <!-- Ball: center (46, 62), radius 28 -->

  <!-- Outer circle — double-line for sketch texture -->
  <circle cx="46" cy="62" r="28"   fill="#080d1a" stroke="white" stroke-width="2.4"/>
  <circle cx="46" cy="62" r="28.8" fill="none"    stroke="white" stroke-width="0.55"
          stroke-dasharray="1.8 7" stroke-dashoffset="2" opacity="0.22"/>

  <!-- Top pentagon (point-up, center ≈ 46,43) -->
  <!-- Vertices: (46,34)·(55,40)·(52,50)·(40,50)·(37,40) -->
  <path d="M46 34 L55 40 L52 50 L40 50 L37 40 Z"
        fill="none" stroke="white" stroke-width="2.0"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right hexagon — shares edge 55,40–52,50 -->
  <path d="M55 40 L64 37 L69 46 L65 56 L54 57 L52 50 Z"
        fill="none" stroke="white" stroke-width="1.7"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>

  <!-- Left hexagon — shares edge 37,40–40,50 -->
  <path d="M37 40 L28 37 L23 46 L27 56 L38 57 L40 50 Z"
        fill="none" stroke="white" stroke-width="1.7"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>

  <!-- Lower-right pentagon — shares edge 65,56–54,57 -->
  <path d="M65 56 L72 63 L68 75 L57 76 L52 66 L54 57 Z"
        fill="none" stroke="white" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.76"/>

  <!-- Lower-left pentagon — shares edge 27,56–38,57 -->
  <path d="M27 56 L20 63 L24 75 L35 76 L40 66 L38 57 Z"
        fill="none" stroke="white" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.76"/>

  <!-- Bottom hexagon -->
  <path d="M40 66 L35 76 L46 83 L57 76 L52 66 L46 68 Z"
        fill="none" stroke="white" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.62"/>

  <!-- Subtle sketch cross-hatch accents -->
  <line x1="27" y1="51" x2="38" y2="57" stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="60" y1="69" x2="68" y2="61" stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.18"/>

</svg>
